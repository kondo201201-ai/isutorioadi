<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <base target="_top" />
    <title>お題入力用</title>
    <style>
      :root {
        --bg: #fff7ed;
        --surface: #ffffff;
        --ink: #263238;
        --muted: #64748b;
        --line: #f2d8bd;
        --mint: #58c4b6;
        --mint-dark: #218a7e;
        --peach: #ffb36b;
        --pink: #f58aa8;
        --yellow: #ffd166;
        --danger: #c2410c;
        --shadow: 0 18px 40px rgba(107, 72, 37, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", "Yu Gothic UI", "Meiryo", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(255, 209, 102, 0.42), transparent 30%),
          radial-gradient(circle at top right, rgba(88, 196, 182, 0.25), transparent 28%),
          var(--bg);
        color: var(--ink);
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .app {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 40px;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 210px;
        gap: 20px;
        align-items: end;
        min-height: 250px;
        padding: 36px;
        border-radius: 8px;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.7)),
          linear-gradient(135deg, var(--peach), var(--mint));
        border: 1px solid rgba(255, 255, 255, 0.72);
        box-shadow: var(--shadow);
      }

      .badge {
        display: inline-flex;
        margin: 0 0 14px;
        padding: 7px 12px;
        border-radius: 999px;
        background: #ffffff;
        color: var(--mint-dark);
        font-weight: 800;
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 12px;
        font-size: clamp(34px, 5vw, 58px);
        line-height: 1.08;
      }

      h2 {
        margin-bottom: 0;
        font-size: 22px;
      }

      .lead {
        margin-bottom: 0;
        color: #44515a;
        font-size: 17px;
        line-height: 1.8;
      }

      .hero-card {
        display: grid;
        place-items: center;
        min-height: 170px;
        border-radius: 8px;
        background: #fff;
        border: 2px solid rgba(255, 179, 107, 0.55);
        box-shadow: 0 12px 28px rgba(79, 54, 24, 0.12);
      }

      .hero-card span,
      .hero-card small {
        color: var(--muted);
        font-weight: 700;
      }

      .hero-card strong {
        color: var(--pink);
        font-size: 58px;
        line-height: 1;
      }

      .workspace {
        display: grid;
        grid-template-columns: 420px minmax(0, 1fr);
        gap: 20px;
        margin-top: 20px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: var(--shadow);
        padding: 22px;
      }

      .panel-title {
        margin-bottom: 18px;
      }

      .panel-title p {
        margin-bottom: 4px;
        color: var(--pink);
        font-size: 13px;
        font-weight: 900;
      }

      .panel-title.with-tools {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 14px;
      }

      label {
        display: grid;
        gap: 7px;
        color: var(--muted);
        font-size: 14px;
        font-weight: 700;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid #e8c7a4;
        border-radius: 8px;
        padding: 12px 13px;
        background: #fffdf9;
        color: var(--ink);
        outline: 0;
      }

      input:focus,
      textarea:focus {
        border-color: var(--mint);
        box-shadow: 0 0 0 4px rgba(88, 196, 182, 0.18);
      }

      textarea {
        resize: vertical;
        line-height: 1.7;
      }

      .topic-fields,
      .input-panel {
        display: grid;
        gap: 15px;
      }

      .actions,
      .tool-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .primary-button,
      .secondary-button,
      .danger-button {
        min-height: 42px;
        border: 0;
        border-radius: 8px;
        padding: 10px 15px;
        font-weight: 900;
      }

      .primary-button {
        background: var(--mint-dark);
        color: #fff;
      }

      .secondary-button {
        background: #fff2d2;
        color: #7c4a03;
      }

      .danger-button {
        background: #fff0e7;
        color: var(--danger);
      }

      .tool-row {
        margin-bottom: 16px;
      }

      .topic-list {
        display: grid;
        gap: 10px;
      }

      .topic-card {
        display: grid;
        grid-template-columns: 34px minmax(0, 1fr);
        gap: 12px;
        align-items: start;
        padding: 13px;
        border: 1px solid #f0d4ba;
        border-radius: 8px;
        background: #fffdf9;
      }

      .topic-number {
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: var(--yellow);
        color: #4f2f00;
        font-weight: 900;
      }

      .topic-card p {
        margin: 0 0 5px;
        font-weight: 800;
        line-height: 1.55;
      }

      .topic-card small {
        color: var(--muted);
      }

      .paste-panel {
        margin-top: 20px;
      }

      .status {
        margin: 14px 0 0;
        color: var(--mint-dark);
        font-weight: 900;
      }

      .status.warning {
        color: var(--danger);
      }

      .hint {
        margin: 10px 0 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .empty {
        padding: 28px;
        border: 1px dashed #e8c7a4;
        border-radius: 8px;
        color: var(--muted);
        text-align: center;
        background: #fffdf9;
      }

      @media (max-width: 860px) {
        .hero,
        .workspace {
          grid-template-columns: 1fr;
        }

        .hero {
          padding: 24px;
        }

        .panel-title.with-tools {
          align-items: stretch;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <div>
          <p class="badge">椅子取りゲーム版</p>
          <h1>お題入力用</h1>
          <p class="lead">中学生向けのお題を、入れましょう！</p>
        </div>
        <div class="hero-card" aria-label="入力状況">
          <span>登録済み</span>
          <strong id="totalTopics">0</strong>
          <small>個のお題</small>
        </div>
      </section>

      <section class="workspace">
        <form id="topicForm" class="panel input-panel">
          <div class="panel-title">
            <p>入力</p>
            <h2>1人分をまとめて登録</h2>
          </div>

          <label>
            名前またはニックネーム
            <input id="nameInput" type="text" placeholder="例: たろう" autocomplete="name" />
          </label>

          <div class="topic-fields">
            <label>
              お題 1
              <input id="topic1" type="text" placeholder="例: M!LK知ってる人！" required />
            </label>
            <label>
              お題 2
              <input id="topic2" type="text" placeholder="例: Mrs. GREEN APPLEの歌が好きな人" />
            </label>
            <label>
              お題 3
              <input id="topic3" type="text" placeholder="例: 泳ぐのが好きな人！" />
            </label>
          </div>

          <div class="actions">
            <button class="primary-button" id="submitButton" type="submit">登録する</button>
          </div>
          <p id="status" class="status">共有一覧を読み込み中です。</p>
        </form>

        <section class="panel list-panel">
          <div class="panel-title with-tools">
            <div>
              <p>一覧</p>
              <h2>集まったお題</h2>
            </div>
            <input id="searchInput" type="search" placeholder="検索" />
          </div>

          <div class="tool-row">
            <button class="secondary-button" id="copyButton" type="button">コピー</button>
            <button class="secondary-button" id="reloadButton" type="button">更新</button>
          </div>

          <div id="topicList" class="topic-list"></div>
        </section>
      </section>

      <section class="panel paste-panel">
        <div class="panel-title">
          <p>貼り付け用</p>
          <h2>スプレッドシート用 1列データ</h2>
        </div>
        <textarea id="sheetText" readonly rows="8"></textarea>
        <p class="hint">必要な時はここをコピーして、GoogleスプレッドシートのA1に貼り付けられます。</p>
      </section>
    </main>

    <script>
      let topics = [];

      const form = document.querySelector("#topicForm");
      const nameInput = document.querySelector("#nameInput");
      const topicInputs = [document.querySelector("#topic1"), document.querySelector("#topic2"), document.querySelector("#topic3")];
      const topicList = document.querySelector("#topicList");
      const searchInput = document.querySelector("#searchInput");
      const totalTopics = document.querySelector("#totalTopics");
      const sheetText = document.querySelector("#sheetText");
      const statusText = document.querySelector("#status");
      const submitButton = document.querySelector("#submitButton");
      const copyButton = document.querySelector("#copyButton");
      const reloadButton = document.querySelector("#reloadButton");

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const owner = nameInput.value.trim() || "名前なし";
        const newTopics = topicInputs.map((input) => input.value.trim()).filter(Boolean);
        if (!newTopics.length) return;

        submitButton.disabled = true;
        setStatus("送信中です。");

        google.script.run
          .withSuccessHandler((items) => {
            topics = items;
            form.reset();
            topicInputs[0].focus();
            render();
            submitButton.disabled = false;
            setStatus("登録しました。みんなの一覧に反映済みです。");
          })
          .withFailureHandler((error) => {
            submitButton.disabled = false;
            setStatus("送信できませんでした。時間をおいてもう一度試してください。", true);
            console.error(error);
          })
          .addTopics({ owner, topics: newTopics });
      });

      searchInput.addEventListener("input", render);
      reloadButton.addEventListener("click", loadTopics);
      copyButton.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(toSheetText(topics));
          temporaryButtonText(copyButton, "コピー済み", "コピー");
        } catch {
          sheetText.focus();
          sheetText.select();
          temporaryButtonText(copyButton, "選択しました", "コピー");
        }
      });

      function loadTopics() {
        setStatus("共有一覧を読み込み中です。");
        google.script.run
          .withSuccessHandler((items) => {
            topics = items;
            render();
            setStatus(`共有一覧を読み込みました。${items.length}件`);
          })
          .withFailureHandler((error) => {
            setStatus("共有一覧を読み込めませんでした。時間をおいてもう一度試してください。", true);
            console.error(error);
          })
          .getTopics();
      }

      function render() {
        const keyword = searchInput.value.trim().toLowerCase();
        const filtered = topics.filter((topic) => `${topic.text} ${topic.owner}`.toLowerCase().includes(keyword));
        totalTopics.textContent = topics.length;
        sheetText.value = toSheetText(topics);
        topicList.innerHTML = filtered.length
          ? filtered.map(topicTemplate).join("")
          : '<div class="empty">まだお題がありません。</div>';
      }

      function topicTemplate(topic, index) {
        return `
          <article class="topic-card">
            <span class="topic-number">${index + 1}</span>
            <div>
              <p>${escapeHtml(topic.text)}</p>
              <small>${escapeHtml(topic.owner)}さんの入力</small>
            </div>
          </article>
        `;
      }

      function toSheetText(items) {
        return items.map((topic) => topic.text).join("\n");
      }

      function setStatus(message, isWarning = false) {
        statusText.textContent = message;
        statusText.classList.toggle("warning", isWarning);
      }

      function temporaryButtonText(button, text, originalText) {
        button.textContent = text;
        setTimeout(() => {
          button.textContent = originalText;
        }, 1400);
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      loadTopics();
      setInterval(loadTopics, 30000);
    </script>
  </body>
</html>
