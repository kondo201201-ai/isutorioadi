<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>お題入力用</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <div>
          <p class="badge">集会 / 椅子取りゲーム版</p>
          <h1><br />お題入力用</h1>
          <p class="lead">
            中学生向けのお題を、入れましょう！
          </p>
        </div>
        <div class="hero-card" aria-label="入力状況">
          <span>登録済み</span>
          <strong id="totalTopics">0</strong>
          <small>個のお題</small>
        </div>
      </section>

      <section class="workspace">
        <form id="topicForm" class="panel input-panel">
          <div class="panel-title">
            <p>入力</p>
            <h2>1人分をまとめて登録</h2>
          </div>

          <label>
            名前またはニックネーム
            <input id="nameInput" type="text" placeholder="例: たろう" autocomplete="name" />
          </label>

          <div class="topic-fields">
            <label>
              お題 1
              <input id="topic1" type="text" placeholder="例: M!LK知ってる人！" required />
            </label>
            <label>
              お題 2
              <input id="topic2" type="text" placeholder="例: Mrs. GREEN APPLEの歌が好きな人" />
            </label>
            <label>
              お題 3
              <input id="topic3" type="text" placeholder="例: 泳ぐのが好きな人！" />
            </label>
          </div>

          <div class="actions">
            <button class="primary-button" type="submit">登録する</button>
          </div>
        </form>

        <section class="panel list-panel">
          <div class="panel-title with-tools">
            <div>
              <p>一覧</p>
              <h2>集まったお題</h2>
            </div>
            <input id="searchInput" type="search" placeholder="検索" />
          </div>

          <div class="tool-row">
            <button class="secondary-button" id="copyButton" type="button">コピー</button>
          </div>

          <p class="hint compact">お題の「上へ」「下へ」で、スプレッドシートに貼り付ける順番を変えられます。</p>
          <div id="topicList" class="topic-list"></div>
        </section>
      </section>

      <section class="panel paste-panel">
        <div class="panel-title">
          <p>貼り付け用</p>
          <h2>スプレッドシート用 1列データ</h2>
        </div>
        <textarea id="sheetText" readonly rows="8"></textarea>
        <p class="hint">ここをコピーして、GoogleスプレッドシートのA1に貼り付けると1行ずつ入ります。</p>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
